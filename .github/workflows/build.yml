name: Build

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Set up Jake
        uses: AstraBert/setup-jake@v0.1.0
      - name: Build multi-platform packages
        run: jake build-and-clean

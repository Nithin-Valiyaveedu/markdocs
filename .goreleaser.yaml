version: 2

builds:
  - binary: markdocs
    ldflags:
      - -X 'github.com/Nithin-Valiyaveedu/markdocs/cmd.Version=v{{ .Version }}'
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "markdocs_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
